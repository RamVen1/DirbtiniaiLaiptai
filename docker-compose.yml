version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dirbtiniai_laiptai_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_KEY=${JWT_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dirbtiniai_network

networks:
  dirbtiniai_network:
    driver: bridge
